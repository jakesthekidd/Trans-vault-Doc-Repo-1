<div class="range-dialog-container">
    <div class="dialog-header">
        <span class="header-text">Range Search</span>
        <button class="close-btn" (click)="onCancel()">
            <mat-icon>cancel</mat-icon>
        </button>
    </div>

    <div class="dialog-content">
        <div class="field-row">
            <label class="field-label">Type of Comparison</label>
            <mat-form-field appearance="outline" class="custom-select">
                <mat-select [(value)]="comparisonType">
                    <mat-option *ngFor="let c of comparisons" [value]="c">
                        {{c}}
                    </mat-option>
                </mat-select>
            </mat-form-field>
        </div>

        <div class="field-row">
            <label class="field-label">Value</label>
            <input type="text" [(ngModel)]="value1" class="custom-input" />
        </div>

        <div class="field-row">
            <label class="field-label">And</label>
            <input type="text" [(ngModel)]="value2" class="custom-input" />
        </div>
    </div>

    <div class="dialog-footer">
        <button class="footer-btn cancel" (click)="onCancel()">CANCEL</button>
        <button class="footer-btn ok" (click)="onOk()">OK</button>
    </div>
</div>
