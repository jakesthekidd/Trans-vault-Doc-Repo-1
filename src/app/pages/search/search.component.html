<div class="query-container">
  <div class="page-name">New Search - VENDOR_BILLS</div>

  <form class="query-form" [formGroup]="searchForm">
    <div class="query-header">
      <p class="criteria-title">Search Criteria</p>
      <span class="criteria-desc">Enter a search term in the index fields to filter your results.</span>
    </div>

    <div class="query-body">
      <div id="queryEditor_table" class="form-row" *ngFor="let field of fields">
        <label class="col-label">{{ field.label }}</label>

        <div class="col-input-wrapper">
          <!-- Non-Date Input -->
          <input *ngIf="field.type !== 'date'" type="text" class="industrial-input"
            [formControlName]="field.controlName" [placeholder]="field.placeholder || ''" (keyup.enter)="onRun()" />

          <!-- Date Input and Picker (Grouped for correct scoping) -->
          <ng-container *ngIf="field.type === 'date'">
            <input type="text" class="industrial-input" [formControlName]="field.controlName"
              [placeholder]="field.placeholder || ''" (keyup.enter)="onRun()" [matDatepicker]="picker" />

            <div class="field-icons">
              <mat-datepicker-toggle [for]="picker" class="industrial-toggle" >
                <mat-icon matDatepickerToggleIcon>calendar_today</mat-icon>
              </mat-datepicker-toggle>
              <mat-datepicker #picker xPosition="end"></mat-datepicker>

              <!-- Search Range Icon -->
              <button type="button" class="query-value-selector range-btn" (click)="openRangeSearch(field.controlName)"
                title="Search range">
              </button>

              <!-- Search List Icon -->
              <button type="button" class="query-value-selector list-btn" (click)="openListSearch(field.controlName)"
                title="Search list">
              </button>
            </div>
          </ng-container>

          <!-- Standard Icons for Non-Date fields -->
          <div class="field-icons" *ngIf="field.type !== 'date'">
            <!-- Search Range Icon -->
            <button type="button" class="query-value-selector range-btn" (click)="openRangeSearch(field.controlName)"
              title="Search range">
            </button>

            <!-- Search List Icon -->
            <!--
              Shown for text fields AND for select_multiple fields that
              declare an options list (e.g. EXCEPTIONS, DOCUMENT HOLDS).
              The original DOC TYPE field (select_multiple without options)
              retains its prior behavior of hiding the list icon.
            -->
            <button type="button" class="query-value-selector list-btn"
              *ngIf="field.type !== 'select_multiple' || field.options"
              (click)="openListSearch(field.controlName)" title="Search list">
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="query-footer">
      <button class="btn-run" (click)="onRun()" [disabled]="isLoading">
        {{ isLoading ? 'Searching...' : 'RUN' }}
      </button>
      <button class="btn-save" (click)="onSave()">SAVE</button>
      <button class="btn-cancel" (click)="onReset()">RESET</button>
    </div>
  </form>
</div>
